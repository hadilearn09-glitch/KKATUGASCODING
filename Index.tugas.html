<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StreamX</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background-color: #0f0f0f;
      color: white;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 30px;
      background: rgba(0,0,0,0.8);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    header h1 {
      color: red;
    }

    nav button {
      margin-left: 10px;
      padding: 8px 15px;
      border: none;
      background: red;
      color: white;
      cursor: pointer;
      border-radius: 5px;
    }

    nav button:hover {
      background: darkred;
    }

    .hero {
      height: 60vh;
      background: url('https://picsum.photos/1200/600') center/cover;
      display: flex;
      align-items: center;
      padding: 30px;
    }

    .hero-content {
      max-width: 500px;
    }

    .hero h2 {
      font-size: 2rem;
      margin-bottom: 10px;
    }

    .hero button {
      padding: 10px 20px;
      background: red;
      border: none;
      color: white;
      cursor: pointer;
      margin-top: 10px;
    }

    .movies {
      padding: 20px;
    }

    .movies h3 {
      margin-bottom: 10px;
    }

    .movie-list {
      display: flex;
      overflow-x: auto;
      gap: 10px;
    }

    .movie {
      min-width: 150px;
      cursor: pointer;
    }

    .movie img {
      width: 100%;
      border-radius: 10px;
    }

    .player {
      display: none;
      padding: 20px;
    }

    video {
      width: 100%;
      max-height: 400px;
      border-radius: 10px;
    }

    footer {
      text-align: center;
      padding: 20px;
      background: #111;
      margin-top: 20px;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .hero {
        height: 40vh;
      }

      .hero h2 {
        font-size: 1.5rem;
      }

      .movie {
        min-width: 120px;
      }
    }

  </style>
</head>

<body>

<header>
  <h1>StreamX</h1>
  <nav>
    <button onclick="showHome()">Home</button>
    <button onclick="showPlayer()">Player</button>
  </nav>
</header>

<section class="hero">
  <div class="hero-content">
    <h2>Film Terbaru Minggu Ini</h2>
    <p>Nikmati streaming gratis dengan kualitas HD</p>
    <button onclick="playVideo('https://www.w3schools.com/html/mov_bbb.mp4')">Tonton Sekarang</button>
  </div>
</section>

<section class="movies" id="home">
  <h3>Rekomendasi</h3>
  <div class="movie-list">
    <div class="movie" onclick="playVideo('https://www.w3schools.com/html/mov_bbb.mp4')">
      <img src="https://picsum.photos/200/300?1">
    </div>
    <div class="movie" onclick="playVideo('https://www.w3schools.com/html/movie.mp4')">
      <img src="https://picsum.photos/200/300?2">
    </div>
    <div class="movie" onclick="playVideo('https://www.w3schools.com/html/mov_bbb.mp4')">
      <img src="https://picsum.photos/200/300?3">
    </div>
    <div class="movie" onclick="playVideo('https://www.w3schools.com/html/movie.mp4')">
      <img src="https://picsum.photos/200/300?4">
    </div>
  </div>
</section>

<section class="player" id="player">
  <h3>Video Player</h3>
  <video id="videoPlayer" controls>
    <source src="" type="video/mp4">
    Browser tidak mendukung video.
  </video>
</section>

<footer>
  <p>© 2026 StreamX - Website Streaming Sederhana</p>
</footer>

<script>
  function playVideo(src) {
    const player = document.getElementById("player");
    const video = document.getElementById("videoPlayer");

    video.src = src;
    player.style.display = "block";

    window.scrollTo({
      top: player.offsetTop,
      behavior: "smooth"
    });

    video.play();
  }

  function showHome() {
    document.getElementById("player").style.display = "none";
    window.scrollTo({ top: 0, behavior: "smooth" });
  }

  function showPlayer() {
    document.getElementById("player").style.display = "block";
    window.scrollTo({
      top: document.getElementById("player").offsetTop,
      behavior: "smooth"
    });
  }
</script>

</body>
</html>
